name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.19 or v0.1.19"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - id: version
        name: Normalize version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: ${{ inputs.version }}" >&2
            exit 1
          fi

          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit and tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- package.json package-lock.json; then
            git add package.json package-lock.json
            git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          fi

          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"
