name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.19 or v0.1.19. Leave blank to increment the latest vX.Y.Z tag."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-tag
      cancel-in-progress: false
    steps:
      - id: release-token
        name: Create release app token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.release-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - id: version
        name: Normalize version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force

          VERSION="$INPUT_VERSION"
          VERSION="${VERSION#v}"

          if [[ -z "$VERSION" ]]; then
            LATEST_TAG="$(
              git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname |
                while read -r tag; do
                  if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "$tag"
                    break
                  fi
                done
            )"

            if [[ -z "$LATEST_TAG" ]]; then
              VERSION="0.1.0"
            else
              BASE_VERSION="${LATEST_TAG#v}"
              IFS="." read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: ${INPUT_VERSION:-$VERSION}" >&2
            exit 1
          fi

          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit and tag version
        run: |
          git config user.name "task-manage-release[bot]"
          git config user.email "task-manage-release[bot]@users.noreply.github.com"

          if ! git diff --quiet -- package.json package-lock.json; then
            git add package.json package-lock.json
            git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          fi

          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"
